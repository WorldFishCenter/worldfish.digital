<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" overflow="visible">
  <defs>
    <style>
      .monogram {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 76px;
        font-weight: 800;
        letter-spacing: -5px;
      }
      .w {
        fill: #1e3a8a;
      }
      .d {
        fill: #00b4d8;
      }
    </style>
  </defs>

  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" class="monogram">
    <tspan class="w">W</tspan><tspan class="d">D</tspan>
  </text>
</svg>
